services:
  ollama:
    image: ollama/ollama:latest
    container_name: virtue-ollama
    restart: unless-stopped
    environment:
      OLLAMA_NUM_PARALLEL: 1
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  advisory-api:
    build: ./advisory-api
    container_name: virtue-advisory
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://virtue:virtuepass@postgres:5432/virtue
      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      # Ollama
      OLLAMA_URL: http://ollama:11434/api/generate
      # Auth
      SERVICE_SECRET_KEY: ${SERVICE_SECRET_KEY:-CHANGE_THIS_IN_PRODUCTION}
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGE_THIS_JWT_SECRET_IN_PRODUCTION}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      # App
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEMO_MODE: ${DEMO_MODE:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: virtue-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15
    container_name: virtue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: virtue
      POSTGRES_USER: virtue
      POSTGRES_PASSWORD: virtuepass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U virtue -d virtue"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ollama:
  qdrant_data:
  postgres_data:
